_schema-version: 3.3.0
ID: vehicleOrderManagement
version: 1.0.0
description: "A simple CAP project."

parameters:
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: vehicleOrderManagement-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: vehicleOrderManagement-db
      - name: vehicleOrderManagement-auth
      - name: GeoMap-destination

  - name: vehicleOrderManagement-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: vehicleOrderManagement-db

resources:
  - name: vehicleOrderManagement-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  - name: vehicleOrderManagement-auth
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: vehicleOrderManagement-${org}-${space}
        tenant-mode: dedicated
        oauth2-configuration:
          credential-types:
            - binding-secret
            - x509

  - name: GeoMap-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
